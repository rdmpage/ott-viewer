<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Tree Transition Demo</title>
<link rel="stylesheet" href="viewer.css">
</head>
<body>

<h2>Tree Transition: Procellariiformes &harr; Pterodroma</h2>
<p style="font-size:12px;color:#666;margin:0">Demo: animates between two pre-chosen trees fetched from tree.php. The interactive viewer is index.php.</p>

<div class="controls">
	<button onclick="jumpTo(0)">t1</button>
	<button onclick="playAnim(-1)">&#9664; t2 &rarr; t1</button>
	<button onclick="playAnim(1)">t1 &rarr; t2 &#9654;</button>
	<button onclick="jumpTo(1)">t2</button>
	<label>t: <input id="slider" type="range" min="0" max="1000" value="0"
		oninput="scrub(this.value/1000)"></label>
	<span id="t-display">0.00</span>
</div>

<div class="legend">
	<span style="background:#333"></span> persist &nbsp;
	<span style="background:#c33"></span> exit &nbsp;
	<span style="background:#36a"></span> enter &nbsp;
	<span style="background:white;border:2px solid #333"></span> has more descendants
</div>

<svg id="canvas" preserveAspectRatio="xMinYMid meet"></svg>

<script src="viewer.js"></script>
<script>
loadTrees();
</script>
</body>
</html>
